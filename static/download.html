<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Unduh ArdiaMindly — A Mindful Companion For Postpartum Moms</title>
<meta name="description" content="Unduh aplikasi ArdiaMindly, teman setia ibu pasca melahirkan."/>
<link rel="icon" type="image/png" href="/static/logo.png"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Playfair+Display:ital,wght@0,700;0,800;1,500&display=swap" rel="stylesheet"/>
<style>
:root{
  --green:#6dbf96;--green2:#85d0aa;--green-deep:#3d7a5e;
  --orange:#e8a96a;--orange-light:#fdebd6;
  --cream:#f0ebe0;--cream2:#faf6ee;
  --text:#2d4a35;--text2:#5a7a62;--text3:#9aa898;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Nunito',sans-serif;
  background:var(--cream);
  color:var(--text);
  min-height:100dvh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:40px 24px;
  position:relative;
  overflow-x:hidden;
}
/* Organic background texture echoing the postpartum/botanical theme */
body::before{
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(circle at 12% 18%, rgba(109,191,150,.13) 0%, transparent 38%),
    radial-gradient(circle at 88% 82%, rgba(232,169,106,.16) 0%, transparent 42%),
    radial-gradient(circle at 85% 15%, rgba(109,191,150,.08) 0%, transparent 30%);
  pointer-events:none;
  z-index:0;
}
.wrap{
  position:relative;
  z-index:1;
  width:100%;
  max-width:380px;
  margin:0 auto;
}
.card{
  background:var(--cream2);
  border-radius:28px;
  padding:40px 32px 36px;
  box-shadow:0 24px 60px rgba(61,122,94,.14), 0 2px 8px rgba(61,122,94,.08);
  border:1px solid rgba(109,191,150,.18);
  text-align:center;
}
.logo{
  width:100%;
  max-width:200px;
  margin:0 auto 8px;
  display:block;
}
.eyebrow{
  font-size:11px;
  font-weight:800;
  letter-spacing:2.5px;
  text-transform:uppercase;
  color:var(--green-deep);
  margin-bottom:6px;
}
h1{
  font-family:'Playfair Display',serif;
  font-size:26px;
  font-weight:700;
  color:var(--text);
  line-height:1.25;
  margin-bottom:8px;
}
.tagline{
  font-size:14px;
  color:var(--text2);
  font-style:italic;
  margin-bottom:28px;
  line-height:1.6;
}
.qr-frame{
  background:#fff;
  border-radius:20px;
  padding:18px;
  display:inline-block;
  box-shadow:0 8px 24px rgba(61,122,94,.12);
  border:2px solid var(--orange-light);
  margin-bottom:10px;
}
.qr-frame img{
  width:200px;
  height:200px;
  display:block;
  border-radius:6px;
}
.qr-hint{
  font-size:12px;
  color:var(--text3);
  font-weight:700;
  letter-spacing:.5px;
  margin-bottom:28px;
}
.divider{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:24px;
}
.divider::before,.divider::after{
  content:'';
  flex:1;
  height:1px;
  background:rgba(109,191,150,.25);
}
.divider span{
  font-size:11px;
  font-weight:800;
  color:var(--text3);
  letter-spacing:1.5px;
  text-transform:uppercase;
}
.btn-download{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  width:100%;
  background:linear-gradient(135deg,var(--green),var(--green2));
  color:#fff;
  border:none;
  padding:17px 24px;
  border-radius:16px;
  font-size:16px;
  font-weight:800;
  font-family:'Nunito',sans-serif;
  cursor:pointer;
  text-decoration:none;
  box-shadow:0 10px 28px rgba(109,191,150,.4);
  transition:transform .15s ease, box-shadow .15s ease;
  letter-spacing:.2px;
}
.btn-download:active{
  transform:scale(.97);
  box-shadow:0 6px 16px rgba(109,191,150,.35);
}
.btn-download svg{width:20px;height:20px;flex-shrink:0}
.footer-note{
  margin-top:22px;
  font-size:12px;
  color:var(--text3);
  line-height:1.6;
}
.footer-note strong{color:var(--text2)}

@media (min-width:480px){
  .card{padding:48px 40px 42px}
  h1{font-size:28px}
}

/* Desktop: card stays compact, centered, with subtle floating logo dressing on either side */
@media (min-width:900px){
  body{padding:48px}
  .wrap{max-width:400px}
  .card{
    box-shadow:0 32px 80px rgba(61,122,94,.18), 0 4px 14px rgba(61,122,94,.10);
  }
  body::after{
    content:'';
    position:fixed;
    top:50%;left:50%;
    width:min(900px,90vw);
    height:min(900px,90vw);
    transform:translate(-50%,-50%);
    background:
      radial-gradient(circle, rgba(109,191,150,.06) 0%, transparent 60%);
    pointer-events:none;
    z-index:0;
  }
}
</style>
</head>
<body>

<div class="wrap">
  <div class="card">
    <img src="/static/logo.png" alt="ArdiaMindly" class="logo"/>
    <div class="eyebrow">Unduh Aplikasi</div>
    <h1>Mulai Perjalanan<br>Mindful Anda</h1>
    <p class="tagline">A Mindful Companion For Postpartum Moms</p>

    <div class="qr-frame">
      <img src="/static/download-qr.png" alt="QR Code Unduh ArdiaMindly"/>
    </div>
    <div class="qr-hint">📷 Pindai dengan kamera ponsel Anda</div>

    <div class="divider"><span>atau</span></div>

    <a class="btn-download" href="https://appsgeyser.io/19919433/ArdiyaMindly" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Unduh Sekarang
    </a>

    <p class="footer-note">
      Tersedia untuk perangkat Android.<br>
      <strong>ArdiaMindly</strong> — Teman setia ibu pasca melahirkan.
    </p>
  </div>
</div>

</body>
</html>
